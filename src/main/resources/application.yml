lumitest:
  screenshot-path: src/main/resources/static/screenshots
  browser:
    type: chromium
    headless: true
  timeouts:
    global: 10000
    heuristic: 300
    fallback: 1000
  max-test-steps: 50

spring:
  data:
    mongodb:
      uri: mongodb://localhost:27017/lumitest
  task:
    execution:
      pool:
        core-size: 5
        max-size: 10
